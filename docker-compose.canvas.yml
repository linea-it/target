services:
  backend: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    depends_on:
      - postgres-14
    volumes:
      - ..:/workspaces
      - ./backend/:/app:z
      - ./logs/:/logs
      - ./data/tmp:/data
    env_file:
      - .envs/.local/.django
      - .envs/.local/.postgres
      - .env
    environment:
      - APPLICATION_NAME=Canvas
      - APPLICATION_TITLE=Canvas Title
      - ENABLE_CLUSTER=True
    command: /start
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres-14:
    build:
      context: .
      dockerfile: ./compose/local/postgresql_14/Dockerfile
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./pg_data:/backups
    env_file:
      - .envs/.local/.postgres

